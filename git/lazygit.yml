gui:
  nerdFontsVersion: "3"
  scrollHeight: 20 # how many lines you scroll by
  language: "zh-CN"
git:
  paging:
    pager: delta --dark --paging=never
  log:
    showGraph: "always"
    showWholeGraph: true
  branchLogCmd: "git log --graph --color=always --oneline --decorate --date=relative {{branchName}} --"
os:
  editPreset: "nvim"
notARepository: "skip" # one of: 'prompt' | 'create' | 'skip' | 'quit'
promptToReturnFromSubprocess: false
keybinding:
  universal:
    nextScreenMode: "="
    prevScreenMode: "-"
    prevPage: "<c-b>" # go to next page in list
    nextPage: "<c-f>" # go to previous page in list
customCommands:
  - key: "U"
    context: "commits"
    prompts:
      - type: "input"
        title: "Update remote branch:"
        key: "Remote"
        initialValue: "{{.SelectedRemote.Name}}"
    command: "git remote update {{.Form.Remote}} --prune"
    loadingText: "Update remote branch"
  - key: "w"
    context: "files"
    prompts:
      - type: "menu"
        title: "Commit Type"
        key: "CommitType"
        options:
          - name: "feat"
            value: "feat"
            description: "A new feature"
          - name: "fix"
            value: "fix"
            description: "A bug fix"
          - name: "chore"
            value: "chore"
            description: "Updating grunt tasks etc; no production code change"
          - name: "refactor"
            value: "refactor"
            description: "A code change that neither fixes a bug nor adds a feature"
          - name: "perf"
            value: "perf"
            description: "A code change that improves performance"
          - name: "docs"
            value: "docs"
            description: "Documentation only changes"
          - name: "style"
            value: "style"
            description: "Changes that do not affect the meaning of the code (white-space, formatting, missing semi-colons, etc)"
          - name: "test"
            value: "test"
            description: "Adding missing tests or correcting existing tests"
          - name: "ci"
            value: "ci"
            description: "Changes to our CI configuration files and scripts (example scopes: Travis, Circle, BrowserStack, SauceLabs)"
          - name: "build"
            value: "build"
            description: "Changes that affect the build system or external dependencies (example scopes: gulp, broccoli, npm)"
          - name: "revert"
            value: "revert"
            description: "revert"
      - type: "input"
        title: "Commit Message"
        key: "CommitMsg"
        initialValue: ""
    command: "git commit -n -m '{{.Form.CommitType}}: {{.Form.CommitMsg}}'"
    loadingText: "commiting..."
