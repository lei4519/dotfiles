gui:
  nerdFontsVersion: "3"
  language: "zh-CN"
git:
  paging:
    pager: delta --dark --paging=never
log:
  showGraph: "always"
  showWholeGraph: true
os:
  editPreset: "nvim"
notARepository: "skip" # one of: 'prompt' | 'create' | 'skip' | 'quit'
promptToReturnFromSubprocess: false
keybinding:
  universal:
    nextScreenMode: "="
    prevScreenMode: "-"
